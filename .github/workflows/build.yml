name: Build

on:
  push:

env:
  CVC5_V: '1.3.3'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Install Binaryen
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q binaryen

      - name: Build
        run: ./build.sh

      - name: Install wasmtime
        uses: bytecodealliance/actions/wasmtime/setup@v1

      - name: Install Scala CLI
        uses: VirtusLab/scala-cli-setup@v1

      - name: Test wasmtime variant
        run: scala-cli run test_server.sc -- cvc5_server_wasmtime.wasm

      - name: Test graal variant
        run: scala-cli run test_server.sc -- cvc5_server_graal.wasm

      - name: Upload GraalWasm variant
        uses: svenstaro/upload-release-action@v2
        with:
          repo_name: sireum/rolling
          repo_token: ${{ secrets.RELEASE_TOKEN }}
          file: cvc5_server_graal.wasm
          asset_name: cvc5-server-${{ env.CVC5_V }}-graal.wasm
          tag: cvc5
          overwrite: true

      - name: Upload wasmtime variant
        uses: svenstaro/upload-release-action@v2
        with:
          repo_name: sireum/rolling
          repo_token: ${{ secrets.RELEASE_TOKEN }}
          file: cvc5_server_wasmtime.wasm
          asset_name: cvc5-server-${{ env.CVC5_V }}-wasmtime.wasm
          tag: cvc5
          overwrite: true

      - name: Upload cvc5 License
        uses: svenstaro/upload-release-action@v2
        with:
          repo_name: sireum/rolling
          repo_token: ${{ secrets.RELEASE_TOKEN }}
          file: cvc5/COPYING
          asset_name: cvc5-server-${{ env.CVC5_V }}-license.txt
          tag: cvc5
          overwrite: true

      - name: Upload Wrapper License
        uses: svenstaro/upload-release-action@v2
        with:
          repo_name: sireum/rolling
          repo_token: ${{ secrets.RELEASE_TOKEN }}
          file: license.txt
          asset_name: cvc5-wasm-server-license.txt
          tag: cvc5
          overwrite: true
