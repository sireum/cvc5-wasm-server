name: Build

on:
  push:

env:
  CVC5_V: '1.3.3'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Install Binaryen
        run: |
          BINARYEN_URL=$(curl -s https://api.github.com/repos/WebAssembly/binaryen/releases/latest \
            | grep -o '"browser_download_url": *"[^"]*x86_64-linux.tar.gz"' \
            | head -1 | cut -d'"' -f4)
          curl -LO "$BINARYEN_URL"
          tar xzf binaryen-*-x86_64-linux.tar.gz
          sudo cp binaryen-*/bin/* /usr/local/bin/

      - name: Install WABT
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q wabt

      - name: Build
        run: ./build.sh

      - name: Install wasmtime
        uses: bytecodealliance/actions/wasmtime/setup@v1

      - name: Install Scala CLI
        uses: VirtusLab/scala-cli-setup@v1

      - name: Test wasmtime variant
        run: scala-cli run test_server.sc -- cvc5_server_wasmtime.wasm

      - name: Test graal variant
        run: scala-cli run test_server.sc -- cvc5_server_graal.wasm

      - name: Upload WASM
        uses: svenstaro/upload-release-action@v2
        with:
          repo_name: sireum/rolling
          repo_token: ${{ secrets.RELEASE_TOKEN }}
          file: cvc5_server_graal.wasm
          asset_name: cvc5-server-${{ env.CVC5_V }}.wasm
          tag: cvc5
          overwrite: true

      - name: Upload cvc5 License
        uses: svenstaro/upload-release-action@v2
        with:
          repo_name: sireum/rolling
          repo_token: ${{ secrets.RELEASE_TOKEN }}
          file: cvc5/COPYING
          asset_name: cvc5-server-${{ env.CVC5_V }}-license.txt
          tag: cvc5
          overwrite: true

      - name: Upload Wrapper License
        uses: svenstaro/upload-release-action@v2
        with:
          repo_name: sireum/rolling
          repo_token: ${{ secrets.RELEASE_TOKEN }}
          file: license.txt
          asset_name: cvc5-wasm-server-license.txt
          tag: cvc5
          overwrite: true
